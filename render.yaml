services:
  - type: web
    name: f1-intelligence-api
    runtime: python
    rootDir: artifacts/api-server
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: PORT
        generateValue: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health
